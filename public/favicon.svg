<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8953a"/>
      <stop offset="100%" stop-color="#e8c060"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="#06070a"/>
  <!-- Radar rings -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="#c8953a" stroke-width="0.6" opacity="0.4"/>
  <circle cx="16" cy="16" r="7"  fill="none" stroke="#c8953a" stroke-width="0.6" opacity="0.4"/>
  <circle cx="16" cy="16" r="3.5" fill="none" stroke="#c8953a" stroke-width="0.6" opacity="0.4"/>
  <!-- Cross hairs -->
  <line x1="5" y1="16" x2="27" y2="16" stroke="#c8953a" stroke-width="0.5" opacity="0.3"/>
  <line x1="16" y1="5" x2="16" y2="27" stroke="#c8953a" stroke-width="0.5" opacity="0.3"/>
  <!-- Sweep arc -->
  <path d="M16 16 L24.5 9.5 A11 11 0 0 1 27 16" fill="url(#g)" opacity="0.25"/>
  <path d="M16 5 A11 11 0 0 1 27 16" fill="none" stroke="url(#g)" stroke-width="1.5" opacity="0.9"/>
  <!-- Blip dots -->
  <circle cx="20" cy="12" r="1.4" fill="#3ecf8e" opacity="0.9"/>
  <circle cx="11" cy="18" r="1"   fill="#3ecf8e" opacity="0.7"/>
  <circle cx="18" cy="21" r="0.9" fill="#e8c060" opacity="0.8"/>
  <!-- Centre -->
  <circle cx="16" cy="16" r="1.5" fill="#c8953a"/>
</svg>
